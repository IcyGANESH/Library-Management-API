<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 30px;
      text-align: center;
    }

    .header h1 {
      color: #667eea;
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      color: #666;
      font-size: 1.1em;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 20px;
      font-size: 1.5em;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      padding: 8px 16px;
      font-size: 0.9em;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .search-container {
      margin-bottom: 20px;
    }

    .search-input {
      display: flex;
      gap: 10px;
    }

    .search-input input {
      flex: 1;
    }

    .search-input button {
      padding: 12px 24px;
    }

    .alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 2px solid #10b981;
    }

    .alert-error {
      background: #fee2e2;
      color: #7f1d1d;
      border: 2px solid #ef4444;
    }

    .alert-info {
      background: #dbeafe;
      color: #1e40af;
      border: 2px solid #3b82f6;
    }

    .books-container {
      grid-column: 1 / -1;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f3f4f6;
    }

    th {
      padding: 15px;
      text-align: left;
      color: #667eea;
      font-weight: 700;
      border-bottom: 2px solid #e5e7eb;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #e5e7eb;
      color: #333;
    }

    tr:hover {
      background: #f9fafb;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .book-card {
      background: #f9fafb;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #e5e7eb;
      transition: all 0.3s;
    }

    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border-color: #667eea;
    }

    .book-title {
      font-size: 1.2em;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 10px;
    }

    .book-info {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
    }

    .book-info strong {
      color: #333;
    }

    .no-books {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 1.1em;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-weight: 600;
    }

    .spinner {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .view-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .view-toggle button {
      padding: 10px 20px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .view-toggle button.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>📚 Library Management System</h1>
      <p>Manage your library collection with ease</p>
    </div>

    <!-- Alerts Container -->
    <div id="alertContainer"></div>

    <!-- Main Content -->
    <div class="content">
      <!-- Add Book Form -->
      <div class="card">
        <h2>➕ Add New Book</h2>
        <form id="addBookForm">
          <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" name="title" placeholder="Book title" required>
          </div>

          <div class="form-group">
            <label for="author">Author *</label>
            <input type="text" id="author" name="author" placeholder="Author name" required>
          </div>

          <div class="form-group">
            <label for="isbn">ISBN *</label>
            <input type="text" id="isbn" name="isbn" placeholder="ISBN (unique)" required>
          </div>

          <div class="form-group">
            <label for="genre">Genre *</label>
            <input type="text" id="genre" name="genre" placeholder="Genre" required>
          </div>

          <div class="form-group">
            <label for="publisher">Publisher *</label>
            <input type="text" id="publisher" name="publisher" placeholder="Publisher" required>
          </div>

          <div class="form-group">
            <label for="publicationYear">Publication Year</label>
            <input type="number" id="publicationYear" name="publicationYear" placeholder="2024">
          </div>

          <div class="form-group">
            <label for="totalCopies">Total Copies</label>
            <input type="number" id="totalCopies" name="totalCopies" placeholder="Number of copies" min="0" value="1">
          </div>

          <div class="form-group">
            <label for="availableCopies">Available Copies</label>
            <input type="number" id="availableCopies" name="availableCopies" placeholder="Available copies" min="0" value="1">
          </div>

          <div class="form-group">
            <label for="shelfLocation">Shelf Location</label>
            <input type="text" id="shelfLocation" name="shelfLocation" placeholder="e.g., A1-5">
          </div>

          <div class="form-group">
            <label for="bookType">Book Type</label>
            <select id="bookType" name="bookType">
              <option value="Circulating">Circulating</option>
              <option value="Reference">Reference</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary">Add Book</button>
        </form>
      </div>

      <!-- Search & Filter -->
      <div class="card">
        <h2>🔍 Search Books</h2>
        <div class="search-container">
          <div class="search-input">
            <input type="text" id="searchInput" placeholder="Search by title..." autocomplete="off">
            <button class="btn btn-primary" onclick="searchBooks()">Search</button>
          </div>
        </div>

        <button class="btn btn-primary" onclick="loadAllBooks()" style="width: 100%; margin-top: 10px;">View All Books</button>

        <div style="margin-top: 20px;">
          <p style="color: #666; font-size: 0.95em;">
            <strong id="bookCount">0</strong> book(s) found
          </p>
        </div>
      </div>
    </div>

    <!-- Books Display -->
    <div class="card books-container">
      <h2>📖 All Books</h2>
      
      <div class="view-toggle">
        <button class="active" onclick="setView('table')">Table View</button>
        <button onclick="setView('grid')">Grid View</button>
      </div>

      <div id="booksDisplay">
        <div class="loading">
          <div class="spinner"></div>
          Loading books...
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3000';
    let currentView = 'table';
    let allBooks = [];

    // Show Alert
    function showAlert(message, type = 'success') {
      const alertContainer = document.getElementById('alertContainer');
      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type}`;
      alertDiv.textContent = message;
      alertContainer.appendChild(alertDiv);

      setTimeout(() => {
        alertDiv.remove();
      }, 5000);
    }

    // Set View (Table or Grid)
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-toggle button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      displayBooks(allBooks);
    }

    // Load All Books
    async function loadAllBooks() {
      try {
        const response = await fetch(`${API_BASE_URL}/books`);
        if (!response.ok) throw new Error('Failed to fetch books');
        
        const data = await response.json();
        allBooks = data.data || [];
        document.getElementById('bookCount').textContent = allBooks.length;
        displayBooks(allBooks);
        showAlert('Books loaded successfully', 'success');
      } catch (error) {
        console.error('Error:', error);
        showAlert('Failed to load books: ' + error.message, 'error');
        displayBooks([]);
      }
    }

    // Search Books
    async function searchBooks() {
      const searchQuery = document.getElementById('searchInput').value.trim();
      
      if (!searchQuery) {
        showAlert('Please enter a search term', 'info');
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/books/search?title=${encodeURIComponent(searchQuery)}`);
        if (!response.ok) throw new Error('Search failed');
        
        const data = await response.json();
        allBooks = data.data || [];
        document.getElementById('bookCount').textContent = allBooks.length;
        displayBooks(allBooks);
        showAlert(`Found ${allBooks.length} book(s)`, 'success');
      } catch (error) {
        console.error('Error:', error);
        showAlert('Search failed: ' + error.message, 'error');
      }
    }

    // Display Books
    function displayBooks(books) {
      const display = document.getElementById('booksDisplay');

      if (books.length === 0) {
        display.innerHTML = '<div class="no-books">No books found. Add one to get started!</div>';
        return;
      }

      if (currentView === 'table') {
        displayTableView(books);
      } else {
        displayGridView(books);
      }
    }

    // Table View
    function displayTableView(books) {
      const display = document.getElementById('booksDisplay');
      let html = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Genre</th>
                <th>Publisher</th>
                <th>Year</th>
                <th>Copies</th>
                <th>Type</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
      `;

      books.forEach(book => {
        html += `
          <tr>
            <td><strong>${escapeHtml(book.title)}</strong></td>
            <td>${escapeHtml(book.author)}</td>
            <td>${escapeHtml(book.isbn)}</td>
            <td>${escapeHtml(book.genre)}</td>
            <td>${escapeHtml(book.publisher)}</td>
            <td>${book.publicationYear || '-'}</td>
            <td>${book.availableCopies}/${book.totalCopies}</td>
            <td><span style="background: ${book.bookType === 'Reference' ? '#fecaca' : '#dbeafe'}; padding: 4px 8px; border-radius: 4px;">${book.bookType}</span></td>
            <td>
              <button class="btn btn-danger" onclick="deleteBook('${book._id}')">Delete</button>
            </td>
          </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
      `;

      display.innerHTML = html;
    }

    // Grid View
    function displayGridView(books) {
      const display = document.getElementById('booksDisplay');
      let html = '<div class="books-grid">';

      books.forEach(book => {
        html += `
          <div class="book-card">
            <div class="book-title">${escapeHtml(book.title)}</div>
            <div class="book-info"><strong>Author:</strong> ${escapeHtml(book.author)}</div>
            <div class="book-info"><strong>ISBN:</strong> ${escapeHtml(book.isbn)}</div>
            <div class="book-info"><strong>Genre:</strong> ${escapeHtml(book.genre)}</div>
            <div class="book-info"><strong>Publisher:</strong> ${escapeHtml(book.publisher)}</div>
            <div class="book-info"><strong>Year:</strong> ${book.publicationYear || '-'}</div>
            <div class="book-info"><strong>Copies:</strong> ${book.availableCopies}/${book.totalCopies}</div>
            <div class="book-info"><strong>Type:</strong> <span style="background: ${book.bookType === 'Reference' ? '#fecaca' : '#dbeafe'}; padding: 2px 6px; border-radius: 3px;">${book.bookType}</span></div>
            <div class="book-info"><strong>Location:</strong> ${book.shelfLocation || '-'}</div>
            <button class="btn btn-danger" onclick="deleteBook('${book._id}')" style="width: 100%; margin-top: 15px;">Delete Book</button>
          </div>
        `;
      });

      html += '</div>';
      display.innerHTML = html;
    }

    // Delete Book
    async function deleteBook(bookId) {
      if (!confirm('Are you sure you want to delete this book?')) return;

      try {
        const response = await fetch(`${API_BASE_URL}/books/${bookId}`, {
          method: 'DELETE'
        });

        if (!response.ok) throw new Error('Delete failed');

        showAlert('Book deleted successfully', 'success');
        loadAllBooks();
      } catch (error) {
        console.error('Error:', error);
        showAlert('Failed to delete book: ' + error.message, 'error');
      }
    }

    // Add Book Form
    document.getElementById('addBookForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        isbn: document.getElementById('isbn').value,
        genre: document.getElementById('genre').value,
        publisher: document.getElementById('publisher').value,
        publicationYear: parseInt(document.getElementById('publicationYear').value) || null,
        totalCopies: parseInt(document.getElementById('totalCopies').value) || 0,
        availableCopies: parseInt(document.getElementById('availableCopies').value) || 0,
        shelfLocation: document.getElementById('shelfLocation').value || null,
        bookType: document.getElementById('bookType').value
      };

      try {
        const response = await fetch(`${API_BASE_URL}/books`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Failed to add book');
        }

        showAlert('Book added successfully!', 'success');
        document.getElementById('addBookForm').reset();
        loadAllBooks();
      } catch (error) {
        console.error('Error:', error);
        showAlert('Error: ' + error.message, 'error');
      }
    });

    // Search on Enter
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchBooks();
      }
    });

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load books on page load
    window.addEventListener('load', () => {
      loadAllBooks();
    });
  </script>
</body>
</html>
